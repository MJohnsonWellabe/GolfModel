# Build the game and publish it to GitHub Pages.
#
# One-time repo setup: Settings → Pages → Source: "GitHub Actions".
# The design documentation lives in docs/; the game build is produced
# into dist/ here and never committed.
name: Deploy to GitHub Pages

on:
  push:
    # version2 is the trunk and the ONLY branch we deploy from. `main` is a
    # stale legacy branch — deploying it would clobber the live site with an
    # old build, so it is deliberately excluded.
    branches: [version2]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# One deployment at a time; let an in-flight deploy finish.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm test
      - run: npm run build # tsc --noEmit + vite build → dist/
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
