name: backtest

# Heavier walk-forward backtest; manual dispatch. Commits the backtest summary
# JSON so the dashboard's Backtest tab updates.

on:
  workflow_dispatch:
    inputs:
      source:
        description: "Data source"
        type: choice
        options: [sample, live]
        default: sample
      n_sims:
        description: "Monte-Carlo sims per round"
        default: "6000"

permissions:
  contents: write

concurrency:
  group: backtest-${{ github.ref }}
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -e .
      - name: Run backtest
        env:
          ODDS_API_KEY: ${{ secrets.ODDS_API_KEY }}
        run: |
          python -m golfmodel run-backtest --source "${{ github.event.inputs.source || 'sample' }}" --n-sims "${{ github.event.inputs.n_sims || '6000' }}"
      - name: Commit backtest summary
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/data/backtest
          if git diff --cached --quiet; then
            echo "No changes."
          else
            git commit -m "backtest: refresh summary [skip ci]"
            git push origin HEAD:${GITHUB_REF_NAME}
          fi
