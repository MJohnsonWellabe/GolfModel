name: backtest

# Walk-forward score-prediction backtest; manual dispatch. Commits the summary
# JSON so the dashboard's Backtest tab updates. Free data, no secrets.

on:
  workflow_dispatch:
    inputs:
      source:
        description: "Data source"
        type: choice
        options: [live, sample]
        default: live
      year:
        description: "Test year (predict this year's rounds vs actual)"
        default: "2026"
      n_sims:
        description: "Monte-Carlo sims per round"
        default: "2500"

permissions:
  contents: write

concurrency:
  group: backtest-${{ github.ref }}
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -e .
      - name: Run backtest
        run: |
          python -m golfmodel run-backtest \
            --source "${{ github.event.inputs.source || 'live' }}" \
            --year "${{ github.event.inputs.year || '2026' }}" \
            --n-sims "${{ github.event.inputs.n_sims || '2500' }}"
      - name: Commit backtest summary
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/data/backtest
          if git diff --cached --quiet; then
            echo "No changes."
          else
            git commit -m "backtest: refresh summary [skip ci]"
            git push origin HEAD:${GITHUB_REF_NAME}
          fi
