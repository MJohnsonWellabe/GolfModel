name: ci

# Tests + build check on pushes/PRs. Does not commit anything.

on:
  push:
    branches-ignore: []
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -e .
      - name: Pytest
        run: python -m pytest -q
      - name: Pipeline smoke (sample, no secrets)
        run: python -m golfmodel run-pipeline --source sample

  web:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: web/package-lock.json
      - name: Build dashboard
        run: cd web && npm ci && npm run build
