name: pipeline

# Fetch data -> run model -> publish JSON -> build dashboard -> commit docs/.
# Scheduled + manual. With no API secrets the 'live' source auto-falls back to
# bundled sample data, so this always produces a working site.

on:
  workflow_dispatch:
    inputs:
      source:
        description: "Data source"
        type: choice
        options: [sample, live]
        default: live
  schedule:
    # Tue/Wed/Thu/Fri mornings (UTC) ~ tournament round mornings. Adjust as needed.
    - cron: "0 11 * * 2,3,4,5"

permissions:
  contents: write

concurrency:
  group: pipeline-${{ github.ref }}
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install Python deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -e .

      - name: Run model pipeline
        # ESPN + Open-Meteo are free and keyless — no secrets needed.
        run: |
          python -m golfmodel run-pipeline --source "${{ github.event.inputs.source || 'live' }}"

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Build dashboard
        run: |
          rm -f docs/index.html
          rm -rf docs/assets
          cd web && npm ci && npm run build

      - name: Commit updated site
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "pipeline: refresh predictions and dashboard [skip ci]"
            git push origin HEAD:${GITHUB_REF_NAME}
          fi
