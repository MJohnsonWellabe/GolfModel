# Global model/pipeline parameters (free-data, score-based model). Backtest is the judge.

decay:
  # Exponential time-decay half-life (days) for weighting historical rounds.
  halflife_days: 180
  # Rounds older than this are dropped entirely.
  max_age_days: 730

rating:
  # Empirical-Bayes shrinkage of a player's "strokes gained vs field" toward 0
  # (an average tour player), in effective rounds.
  shrinkage_k: 10.0
  # How strongly to pull a player's course-specific rating toward their overall
  # rating (effective course rounds needed to half-trust the course number).
  course_shrinkage_k: 6.0
  # Weight on same-cluster (similar-course) history when forming the course rating.
  cluster_weight: 0.5

field_strength:
  # Kernel bandwidth for similar-field re-weighting (strokes units).
  similarity_bandwidth: 1.5

partners:
  # Low-signal term; OFF by default until the backtest proves it adds value.
  enabled: false
  effect_sd: 0.0

weather:
  # Strokes added to the field per 1 mph of (exposure-scaled) wind above calm.
  wind_strokes_per_mph: 0.06
  calm_wind_mph: 5.0
  # Strokes added when measurable precip is present in the tee window.
  precip_penalty: 0.4
  # Multiplier on round-score SD per 10 mph of wind (variance amplifier).
  wind_variance_per_10mph: 0.12
  # Tee-time window (hours) around each player's start used to aggregate conditions.
  tee_window_hours: 4.5

distribution:
  monte_carlo_sims: 10000
  base_score_sd: 2.8          # baseline per-round score SD (strokes)
  sd_shrinkage_k: 12.0        # shrink player SD toward field SD (effective rounds)
  skew: 3.0                   # right tail = blow-up holes
  shared_shock_sd: 0.8        # SD of the per-wave shared environment shock
  random_seed: 20260620

environment:
  default_par: 71
