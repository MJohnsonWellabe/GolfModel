<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Character Portrait Harness</title>
    <style>
      html,
      body {
        margin: 0;
        background: transparent;
      }
      #c {
        width: 420px;
        height: 560px;
        display: block;
        touch-action: none;
      }
    </style>
  </head>
  <body>
    <!-- Dev-only harness: renders a single character as a 3:4 portrait on a
         transparent background for scripts/gen-portraits.mjs. Not part of the
         shipped build (only index.html/slice3d.html are build inputs). -->
    <canvas id="c" width="420" height="560"></canvas>
    <script type="module" src="/src/portrait.ts"></script>
  </body>
</html>
