<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="robots" content="noindex" />
    <title>Bite-Sized Golf — Admin</title>
    <style>
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      body {
        background: #0b3d1f;
        color: #f2f7f0;
        font-family: 'Trebuchet MS', 'Segoe UI', system-ui, sans-serif;
        min-height: 100vh;
        padding: 24px 16px 60px;
      }
      #app {
        max-width: 760px;
        margin: 0 auto;
      }
      h1 {
        font-size: 26px;
        margin-bottom: 4px;
      }
      h2 {
        font-size: 19px;
        margin: 26px 0 10px;
        color: #ffd54f;
      }
      h3 {
        font-size: 15px;
        margin: 14px 0 6px;
        color: #bfe8c5;
      }
      h4 {
        font-size: 13px;
        margin: 10px 0 4px;
        color: #9fc9a8;
      }
      .sub {
        color: #a9c9b0;
        font-size: 14px;
        margin-bottom: 12px;
      }
      .guestLine {
        margin-top: 12px;
        padding: 10px 12px;
        border-radius: 10px;
        background: rgba(100, 220, 255, 0.08);
        border: 1px solid rgba(100, 220, 255, 0.22);
        font-size: 14px;
        color: #dbe8d6;
      }
      .guestLine b {
        color: #64dcff;
      }
      section {
        background: linear-gradient(180deg, rgba(12, 44, 20, 0.92), rgba(6, 28, 12, 0.88));
        border: 1px solid rgba(255, 255, 255, 0.12);
        border-radius: 14px;
        padding: 14px 16px 18px;
        margin-top: 16px;
        overflow-x: auto;
      }
      .summary {
        padding: 16px;
      }
      .tiles {
        display: grid;
        grid-template-columns: repeat(4, 1fr);
        gap: 12px;
      }
      @media (max-width: 520px) {
        .tiles {
          grid-template-columns: repeat(2, 1fr);
        }
      }
      .tile {
        background: rgba(255, 255, 255, 0.06);
        border: 1px solid rgba(255, 255, 255, 0.1);
        border-radius: 10px;
        padding: 12px 10px;
        text-align: center;
      }
      .tval {
        font-size: 24px;
        font-weight: 700;
        color: #ffd54f;
      }
      .tlbl {
        font-size: 12px;
        color: #a9c9b0;
        margin-top: 4px;
      }
      table {
        border-collapse: collapse;
        width: 100%;
        font-size: 14px;
      }
      th,
      td {
        text-align: left;
        padding: 6px 10px;
        border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        white-space: nowrap;
      }
      th {
        color: #a9c9b0;
        font-weight: 600;
      }
      .n {
        color: #7fa387;
        font-size: 11px;
      }
      .barcell {
        width: 40%;
        min-width: 120px;
      }
      .bar {
        background: rgba(255, 255, 255, 0.12);
        border-radius: 6px;
        height: 12px;
        overflow: hidden;
      }
      .fill {
        background: linear-gradient(90deg, #ffd54f, #eab63a);
        height: 100%;
        border-radius: 6px;
      }
      .btn {
        background: linear-gradient(180deg, #ffd54f, #eab63a);
        border: none;
        border-radius: 10px;
        color: #223;
        cursor: pointer;
        font-family: inherit;
        font-size: 16px;
        font-weight: 700;
        margin-top: 12px;
        padding: 12px 22px;
      }
      .btn.back {
        margin: 0 0 14px;
        padding: 9px 16px;
        font-size: 14px;
        background: rgba(255, 255, 255, 0.12);
        color: #eef5ea;
      }
      /* ---- Admin landing (destination cards) ---- */
      .adminGrid {
        display: grid;
        grid-template-columns: repeat(2, 1fr);
        gap: 14px;
        margin-top: 18px;
      }
      @media (max-width: 560px) {
        .adminGrid {
          grid-template-columns: 1fr;
        }
      }
      .adminCard {
        display: flex;
        flex-direction: column;
        gap: 6px;
        text-align: left;
        background: linear-gradient(180deg, rgba(12, 44, 20, 0.92), rgba(6, 28, 12, 0.88));
        border: 1px solid rgba(255, 255, 255, 0.14);
        border-radius: 14px;
        padding: 16px 16px 18px;
      }
      .adminCard .acIcon {
        font-size: 26px;
      }
      .adminCard .acTitle {
        font-size: 17px;
        font-weight: 800;
        color: #fff;
      }
      .adminCard .acDesc {
        font-size: 13px;
        color: #a9c9b0;
        flex: 1 1 auto;
      }
      .adminCard .acMeta {
        font-size: 12px;
        color: #7fa387;
        display: flex;
        gap: 8px;
        flex-wrap: wrap;
        align-items: center;
      }
      .adminCard .acStatus {
        border-radius: 999px;
        padding: 2px 9px;
        font-weight: 700;
        font-size: 11px;
        background: rgba(255, 255, 255, 0.1);
        color: #cfe6d3;
      }
      .adminCard .acStatus.live {
        background: linear-gradient(180deg, #a8e6a1, #6cc26a);
        color: #10331d;
      }
      .adminCard .acStatus.draft {
        background: linear-gradient(180deg, #ffd08a, #ef9a3d);
        color: #3a2405;
      }
      .adminCard .acOpen {
        margin-top: 8px;
        align-self: flex-start;
      }
      /* ---- Marketing Manager ---- */
      .mm-lbl {
        display: flex;
        flex-direction: column;
        gap: 4px;
        font-size: 12px;
        color: #a9c9b0;
        margin-top: 8px;
      }
      .mm-lbl input,
      .mm-lbl textarea,
      .mm-lbl select {
        background: rgba(255, 255, 255, 0.08);
        border: 1px solid rgba(255, 255, 255, 0.16);
        border-radius: 8px;
        color: #f2f7f0;
        font-family: inherit;
        font-size: 14px;
        padding: 7px 9px;
        width: 100%;
      }
      .mm-clip,
      .mm-course {
        border: 1px solid rgba(255, 255, 255, 0.12);
        border-radius: 12px;
        padding: 10px 12px 14px;
        margin-top: 12px;
        background: rgba(255, 255, 255, 0.03);
      }
      .mm-clip-head {
        display: flex;
        align-items: center;
        gap: 12px;
        flex-wrap: wrap;
      }
      .mm-ord {
        font-weight: 700;
        color: #ffd54f;
      }
      .mm-check {
        display: inline-flex;
        align-items: center;
        gap: 5px;
        font-size: 13px;
        color: #cfe6d3;
      }
      .mm-icon {
        background: rgba(255, 255, 255, 0.12);
        border: none;
        border-radius: 7px;
        color: #eef5ea;
        cursor: pointer;
        font-size: 14px;
        padding: 3px 9px;
      }
      .mm-icon:disabled {
        opacity: 0.35;
        cursor: default;
      }
      .mm-grid2 {
        display: grid;
        grid-template-columns: 150px 1fr;
        gap: 14px;
        margin-top: 10px;
      }
      @media (max-width: 560px) {
        .mm-grid2 {
          grid-template-columns: 1fr;
        }
      }
      .mm-prev,
      .mm-pv-grid video {
        width: 100%;
        border-radius: 10px;
        background: #071c10;
        aspect-ratio: 9 / 16;
        object-fit: cover;
        display: block;
      }
      .mm-trim {
        display: flex;
        gap: 12px;
      }
      .mm-trim .mm-num {
        flex: 1;
      }
      /* preview */
      .mm-pv-hero {
        border-radius: 12px;
        background-size: cover;
        background-position: center;
        padding: 22px 16px;
        margin-top: 8px;
        box-shadow: inset 0 0 0 2000px rgba(5, 23, 13, 0.55);
      }
      .mm-pv-hero h3 {
        color: #fff;
        font-size: 20px;
      }
      .mm-pv-stats {
        display: flex;
        gap: 14px;
        flex-wrap: wrap;
        margin-top: 10px;
        font-size: 12px;
        color: #cfe6d3;
      }
      .mm-pv-stats b {
        color: #ffd54f;
      }
      .mm-pv-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
        gap: 10px;
        margin-top: 12px;
      }
      .mm-pv-grid .clip {
        position: relative;
        border-radius: 10px;
        overflow: hidden;
      }
      .mm-pv-grid .cap {
        position: absolute;
        left: 0;
        right: 0;
        bottom: 0;
        padding: 16px 8px 6px;
        background: linear-gradient(180deg, transparent, rgba(4, 16, 9, 0.92));
        font-size: 11px;
      }
      .mm-pv-grid .cap b {
        display: block;
      }
      .mm-pv-grid .badge {
        position: absolute;
        top: 6px;
        left: 6px;
        background: #ffd54f;
        color: #06210f;
        border-radius: 999px;
        font-size: 10px;
        font-weight: 700;
        padding: 2px 7px;
      }
      .mm-reel {
        max-width: 220px;
        margin: 10px auto 0;
      }
      .mm-pv-courses {
        display: flex;
        gap: 10px;
        flex-wrap: wrap;
        margin-top: 12px;
      }
      .mm-pv-course {
        width: 120px;
        font-size: 12px;
      }
      .mm-pv-course img {
        width: 100%;
        border-radius: 8px;
        aspect-ratio: 16 / 10;
        object-fit: cover;
        display: block;
        margin-bottom: 4px;
      }
      code {
        background: rgba(255, 255, 255, 0.1);
        border-radius: 5px;
        padding: 1px 6px;
        font-size: 12px;
      }
    </style>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/admin/main.ts"></script>
  </body>
</html>
